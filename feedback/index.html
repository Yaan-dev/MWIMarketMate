<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>功能建议 — MWI Market Mate</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <h1 id="title">💡 功能建议</h1>
    <p class="subtitle" id="subtitle">提交你的想法，帮助我们改进插件</p>

    <form id="feedbackForm">
      <div class="form-group">
        <label id="labelText">建议内容 *</label>
        <textarea id="text" maxlength="2000" placeholder="描述你希望添加的功能或改进..." required></textarea>
        <div class="hint" id="charHint">最多 2000 字</div>
      </div>

      <div class="form-group">
        <label id="labelNick">昵称（选填）</label>
        <input type="text" id="nickname" maxlength="50" placeholder="你的游戏昵称或称呼">
      </div>

      <button type="submit" class="btn" id="submitBtn">提交建议</button>
    </form>

    <div id="msg" class="msg"></div>

    <div class="footer">
      <a href="../">← 返回首页</a>
    </div>
  </div>

  <script src="../js/feedback.js"></script>
</body>
</html>
