<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>使用说明 — MWI Market Mate</title>
  <meta name="description" content="MWI 市场伴侣使用说明与功能详解">
  <style>
    /* ─── 设计 Token（和 landing / community 对齐） ───────── */
    :root {
      --bg:              #08080e;
      --surface-1:       #0f0f17;
      --surface-2:       #14141d;
      --surface-3:       #1a1a24;
      --border-soft:     rgba(255, 255, 255, .06);
      --border-medium:   rgba(255, 255, 255, .12);
      --border-strong:   rgba(255, 255, 255, .18);
      --border-gold:     rgba(240, 180, 41, .45);
      --border-gold-dim: rgba(240, 180, 41, .18);

      --text-primary:    #fff;
      --text-body:       rgba(255, 255, 255, .88);
      --text-weak:       rgba(255, 255, 255, .62);
      --text-faint:      rgba(255, 255, 255, .4);

      --accent-gold:        #f0b429;
      --accent-gold-bright: #fcd34d;
      --accent-gold-glow:   rgba(240, 180, 41, .35);

      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
                   "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, "Cascadia Code",
                   "Consolas", "Microsoft YaHei", monospace;

      --ease-out: cubic-bezier(.25, .8, .3, 1);
    }

    /* ─── 基础重置 ───────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-body);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, h4, p, ul, ol { margin: 0; padding: 0; }
    svg { display: inline-block; flex-shrink: 0; }
    img { max-width: 100%; height: auto; }

    /* ─── 背景层（同 landing/community） ───────────────────── */
    .bg {
      position: fixed; inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .bg-glow {
      position: absolute;
      left: 50%; top: 30%;
      width: 80vw; height: 80vw;
      max-width: 1200px; max-height: 1200px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center,
                   rgba(240, 180, 41, .10) 0%,
                   rgba(240, 180, 41, .04) 25%,
                   rgba(240, 180, 41, 0) 60%);
      filter: blur(40px);
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(to right,  rgba(255, 255, 255, .025) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, .025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    }
    .bg-stars, .bg-stars::after, .bg-stars::before {
      content: ""; position: absolute;
      width: 1px; height: 1px;
      background: transparent;
      border-radius: 50%;
    }
    .bg-stars {
      top: 0; left: 0;
      box-shadow:
        5vw 8vh  1px rgba(255,255,255,.35), 12vw 22vh 1px rgba(255,255,255,.3),
        22vw 5vh 1px rgba(255,255,255,.4),  30vw 15vh 1px rgba(255,255,255,.3),
        38vw 28vh 1px rgba(255,255,255,.35), 46vw 10vh 1px rgba(255,255,255,.3),
        55vw 20vh 1px rgba(255,255,255,.35), 63vw 6vh  1px rgba(255,255,255,.4),
        71vw 18vh 1px rgba(255,255,255,.3),  80vw 27vh 1px rgba(255,255,255,.35),
        88vw 12vh 1px rgba(255,255,255,.3),  95vw 24vh 1px rgba(255,255,255,.4),
        3vw 40vh  1px rgba(255,255,255,.35), 14vw 48vh 1px rgba(255,255,255,.3),
        24vw 58vh 1px rgba(255,255,255,.4),  33vw 42vh 1px rgba(255,255,255,.35),
        42vw 65vh 1px rgba(255,255,255,.3),  51vw 50vh 1px rgba(255,255,255,.35),
        60vw 62vh 1px rgba(255,255,255,.3),  68vw 45vh 1px rgba(255,255,255,.4),
        76vw 55vh 1px rgba(255,255,255,.3),  85vw 68vh 1px rgba(255,255,255,.35),
        92vw 50vh 1px rgba(255,255,255,.3),  7vw 72vh  1px rgba(255,255,255,.4),
        18vw 85vh 1px rgba(255,255,255,.3),  28vw 78vh 1px rgba(255,255,255,.35),
        37vw 90vh 1px rgba(255,255,255,.3),  47vw 80vh 1px rgba(255,255,255,.35),
        58vw 93vh 1px rgba(255,255,255,.4),  67vw 76vh 1px rgba(255,255,255,.3),
        78vw 88vh 1px rgba(255,255,255,.35), 87vw 82vh 1px rgba(255,255,255,.3),
        96vw 90vh 1px rgba(255,255,255,.4);
    }
    .bg-stars::after {
      box-shadow:
        18vw 12vh 2px rgba(240,180,41,.7),
        72vw 30vh 2px rgba(240,180,41,.65),
        25vw 70vh 2px rgba(240,180,41,.7),
        88vw 62vh 2px rgba(240,180,41,.6),
        45vw 8vh  2px rgba(240,180,41,.55),
        55vw 85vh 2px rgba(240,180,41,.65);
      animation: twinkle 4s ease-in-out infinite;
    }
    .bg-stars::before {
      box-shadow:
        35vw 35vh 2px rgba(240,180,41,.6),
        78vw 18vh 2px rgba(240,180,41,.55),
        15vw 55vh 2px rgba(240,180,41,.7),
        62vw 72vh 2px rgba(240,180,41,.6);
      animation: twinkle 5s ease-in-out infinite .8s;
    }
    @keyframes twinkle {
      0%, 100% { opacity: .7; }
      50%      { opacity: 1; }
    }

    /* ─── 容器：单栏，适合阅读 ───────────────────── */
    .guide-wrapper {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 24px 24px;
      animation: fadeUp .7s var(--ease-out) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── 页面标题 ───────────────────── */
    #guide-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 800;
      letter-spacing: -.015em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    #guide-title svg {
      width: 28px; height: 28px;
      color: var(--accent-gold);
    }
    .subtitle {
      color: var(--text-weak);
      font-size: 14px;
      margin-bottom: 40px;
      font-family: var(--font-mono);
      letter-spacing: .1px;
    }

    /* ─── Loading ───────────────────── */
    .loading {
      padding: 48px 16px;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
      font-family: var(--font-mono);
    }
    .loading::before {
      content: "";
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border-medium);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: -2px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═════════════════════════════════════════════════════════
       Guide 内容区 排版系统
       ═════════════════════════════════════════════════════════
       guide.js 会往 #guideContent 里塞内容（很可能是 markdown 渲染
       结果）。下面给所有常见 HTML 元素预设排版。
    ═════════════════════════════════════════════════════════ */
    .guide-content {
      font-size: 15.5px;
      line-height: 1.8;
      color: var(--text-body);
    }

    /* ── 标题层级 ── */
    .guide-content h1,
    .guide-content h2,
    .guide-content h3,
    .guide-content h4,
    .guide-content h5,
    .guide-content h6 {
      color: var(--text-primary);
      font-weight: 700;
      letter-spacing: -.01em;
      scroll-margin-top: 24px;
    }
    .guide-content h1 {
      font-size: 26px;
      margin: 48px 0 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-soft);
    }
    .guide-content h2 {
      font-size: 22px;
      margin: 40px 0 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .guide-content h2::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 20px;
      background: var(--accent-gold);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .guide-content h3 {
      font-size: 18px;
      margin: 32px 0 12px;
      color: var(--accent-gold-bright);
    }
    .guide-content h4 {
      font-size: 16px;
      margin: 24px 0 10px;
    }
    .guide-content h5,
    .guide-content h6 {
      font-size: 15px;
      margin: 20px 0 8px;
      color: var(--text-weak);
    }

    /* ── 段落 ── */
    .guide-content p {
      margin: 0 0 16px;
    }
    .guide-content > *:first-child { margin-top: 0; }

    /* ── 列表 ── */
    .guide-content ul,
    .guide-content ol {
      margin: 0 0 16px;
      padding-left: 26px;
    }
    .guide-content li {
      margin-bottom: 6px;
      line-height: 1.75;
    }
    .guide-content ul li::marker { color: var(--accent-gold); }
    .guide-content ol li::marker {
      color: var(--accent-gold);
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .guide-content li > ul,
    .guide-content li > ol {
      margin-top: 6px;
      margin-bottom: 6px;
    }

    /* ── 链接 ── */
    .guide-content a {
      color: var(--accent-gold-bright);
      text-decoration: underline;
      text-decoration-color: rgba(240, 180, 41, .3);
      text-underline-offset: 3px;
      transition: color .2s, text-decoration-color .2s;
      word-break: break-word;
    }
    .guide-content a:hover {
      color: var(--accent-gold);
      text-decoration-color: var(--accent-gold);
    }

    /* ── 内联代码 ── */
    .guide-content code {
      display: inline-block;
      padding: 1px 7px;
      margin: 0 1px;
      font-family: var(--font-mono);
      font-size: .88em;
      color: var(--accent-gold-bright);
      background: var(--surface-2);
      border: 1px solid var(--border-soft);
      border-radius: 4px;
      line-height: 1.5;
    }

    /* ── 代码块 ── */
    .guide-content pre {
      padding: 16px 20px;
      margin: 20px 0;
      background: var(--surface-1);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.65;
      font-family: var(--font-mono);
    }
    .guide-content pre code {
      display: block;
      padding: 0;
      margin: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      color: var(--text-body);
      font-size: inherit;
      line-height: inherit;
    }

    /* ── 引用块 ── */
    .guide-content blockquote {
      margin: 20px 0;
      padding: 12px 18px;
      background: rgba(240, 180, 41, .05);
      border-left: 3px solid var(--accent-gold);
      border-radius: 4px 8px 8px 4px;
      color: var(--text-weak);
      font-style: normal;
    }
    .guide-content blockquote p:last-child { margin-bottom: 0; }
    .guide-content blockquote strong {
      color: var(--accent-gold-bright);
    }

    /* ── 分隔线 ── */
    .guide-content hr {
      margin: 40px 0;
      border: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border-soft), transparent);
    }

    /* ── 表格 ── */
    .guide-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 13.5px;
      background: var(--surface-1);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      overflow: hidden;
    }
    .guide-content thead th {
      padding: 10px 14px;
      text-align: left;
      background: var(--surface-2);
      font-weight: 600;
      color: var(--text-primary);
      font-size: 12.5px;
      letter-spacing: .3px;
      border-bottom: 1px solid var(--border-medium);
    }
    .guide-content tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-soft);
      color: var(--text-body);
      vertical-align: top;
    }
    .guide-content tbody tr:last-child td { border-bottom: none; }
    .guide-content tbody tr:hover td { background: var(--surface-2); }

    /* ── 图片 ── */
    .guide-content img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .4);
      margin: 16px auto;
      border: 1px solid var(--border-soft);
    }

    /* ── 强调 ── */
    .guide-content strong,
    .guide-content b       { font-weight: 700; color: var(--text-primary); }
    .guide-content em,
    .guide-content i       { font-style: italic; color: var(--text-body); }
    .guide-content del,
    .guide-content s       { color: var(--text-faint); text-decoration-color: var(--text-faint); }
    .guide-content mark {
      background: rgba(240, 180, 41, .22);
      color: var(--accent-gold-bright);
      padding: 0 4px;
      border-radius: 3px;
    }

    /* ── 键盘按键（如 <kbd>Ctrl</kbd>+<kbd>C</kbd>） ── */
    .guide-content kbd {
      display: inline-block;
      padding: 1px 7px;
      font-family: var(--font-mono);
      font-size: .85em;
      color: var(--text-primary);
      background: var(--surface-3);
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      box-shadow: 0 1px 0 var(--border-medium);
      line-height: 1.5;
    }

    /* ── 其他常见容器 ── */
    .guide-content details {
      margin: 16px 0;
      padding: 12px 16px;
      background: var(--surface-1);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
    }
    .guide-content details summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--text-primary);
    }
    .guide-content details[open] summary { margin-bottom: 10px; }

    /* ─── Footer ───────────────────── */
    .footer {
      max-width: 860px;
      margin: 56px auto 0;
      padding: 24px;
      text-align: center;
      border-top: 1px solid var(--border-soft);
      color: var(--text-faint);
      font-size: 13px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .footer a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-weak);
      padding: 8px 14px;
      border-radius: 8px;
      transition: all .2s var(--ease-out);
    }
    .footer a:hover {
      color: var(--accent-gold);
      background: rgba(240, 180, 41, .06);
    }
    .footer a svg { width: 14px; height: 14px; }
    .footer a[href="../"]:hover svg:first-child { transform: translateX(-2px); }
    .footer .divider {
      color: var(--text-faint);
      opacity: .5;
      user-select: none;
    }

    /* ─── 响应式 ───────────────────── */
    @media (max-width: 640px) {
      .guide-wrapper { padding: 40px 20px 16px; }
      .guide-content { font-size: 15px; line-height: 1.75; }
      .guide-content pre { padding: 12px 14px; font-size: 12.5px; }
      .guide-content table { font-size: 13px; }
      .guide-content thead th,
      .guide-content tbody td { padding: 8px 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>
  <!-- 背景视觉层 -->
  <div class="bg" aria-hidden="true">
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>
    <div class="bg-stars"></div>
  </div>

  <div class="guide-wrapper">

    <h1 id="guide-title">
      <!-- book-open icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span>使用说明</span>
    </h1>
    <p class="subtitle" id="guide-subtitle">MWI 市场伴侣 — 功能详解与使用流程</p>

    <div id="guideContent" class="guide-content">
      <div class="loading" id="loadingGuide">加载中...</div>
    </div>

  </div>

  <!-- 返回首页 + 社区中心 -->
  <div class="footer" style="margin-top:40px;">
    <a href="../">
      <!-- arrow-left icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m12 19-7-7 7-7"/>
        <path d="M19 12H5"/>
      </svg>
      <span id="backText">返回首页</span>
    </a>
    <span class="divider">·</span>
    <a href="../community/" id="communityLink">
      <!-- message-circle icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22z"/>
      </svg>
      <span id="communityText">社区中心</span>
    </a>
  </div>

  <script src="../js/guide.js"></script>
</body>
</html>
